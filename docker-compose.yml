name: consumerlending-camunda7ce

services:
  postgres:
    image: postgres:15
    container_name: camunda-postgres
    environment:
      POSTGRES_DB: camunda
      POSTGRES_USER: camunda
      POSTGRES_PASSWORD: camunda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camunda"]
      interval: 10s
      timeout: 5s
      retries: 5

  camunda:
    image: ${CAMUNDA_IMAGE:-camunda/camunda-bpm-platform:run-latest}
    container_name: camunda7
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/camunda
      DB_USERNAME: camunda
      DB_PASSWORD: camunda
      # Keep for compatibility; main control is deployment-resource-pattern below.
      SKIP_EXAMPLES: "true"
      SPRING_APPLICATION_JSON: >
        {
          "camunda.bpm.auto-deployment-enabled": true,
          "camunda.bpm.deployment-resource-pattern": "file:/camunda/configuration/resources/bpmn/*.bpmn"
        }
    volumes:
      - ./worker-service/src/main/resources/bpmn:/camunda/configuration/resources/bpmn:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/camunda"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  worker-service:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    container_name: lending-worker-service
    depends_on:
      camunda:
        condition: service_healthy
    environment:
      CAMUNDA_BASE_URL: http://camunda:8080/engine-rest

  startup-info:
    image: curlimages/curl:8.9.1
    container_name: camunda-startup-info
    depends_on:
      camunda:
        condition: service_healthy
    command: >
      sh -c "until curl -sf http://camunda:8080/camunda >/dev/null; do sleep 2; done;
             echo '====================================================';
             echo 'Camunda 7 is ready and can be used now.';
             echo 'Open: http://localhost:8081/camunda';
             echo 'Default login: demo / demo';
             echo '===================================================='"

volumes:
  postgres_data: