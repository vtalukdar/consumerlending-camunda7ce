version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: camunda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-camunda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camunda123}
      POSTGRES_DB: ${POSTGRES_DB:-camunda_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camunda} -d ${POSTGRES_DB:-camunda_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camunda-network

  # Camunda 7 CE Backend with Spring Boot
  camunda-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camunda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-camunda_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-camunda}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-camunda123}
      CAMUNDA_BPM_ADMIN_USER_ID: ${CAMUNDA_ADMIN_USER:-admin}
      CAMUNDA_BPM_ADMIN_USER_PASSWORD: ${CAMUNDA_ADMIN_PASSWORD:-admin123}
    ports:
      - "${CAMUNDA_PORT:-8080}:8080"
    volumes:
      - camunda_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - camunda-network

  # Frontend (Lit Web Components)
  camunda-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: camunda-frontend
    restart: unless-stopped
    depends_on:
      - camunda-backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - API_URL=http://camunda-backend:8080
    networks:
      - camunda-network

networks:
  camunda-network:
    driver: bridge

volumes:
  postgres_data:
  camunda_logs: