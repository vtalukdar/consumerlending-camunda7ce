<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Propositions Form</title>
  <style>
    :root {
      --lion-primary-color: #003399;
      --lion-error-color: #c00000;
      --lion-neutral-color: #595959;
      --lion-light-color: #f2f2f2;
      --lion-border-color: #e0e0e0;
    }

    * { box-sizing: border-box; }

    .form-container {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.5rem;
      border: 1px solid var(--lion-border-color);
      border-radius: 4px;
      background: #fff;
      color: var(--lion-neutral-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .form-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--lion-primary-color);
      margin: 0 0 0.5rem;
      border-bottom: 2px solid var(--lion-primary-color);
      padding-bottom: 0.75rem;
    }

    .subtitle { margin: 0 0 1.5rem; }

    .alert {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      border: 1px solid var(--lion-error-color);
      border-left: 4px solid var(--lion-error-color);
      background: #ffe6e6;
      color: var(--lion-error-color);
      font-size: 13px;
    }

    .propositions-list {
      display: grid;
      gap: 1rem;
      margin: 1rem 0;
    }

    .proposition-card {
      border: 2px solid var(--lion-border-color);
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .proposition-card.active {
      border-color: var(--lion-primary-color);
      box-shadow: 0 0 0 2px rgba(0, 51, 153, 0.08);
      background: #f8fbff;
    }

    .proposition-card h3 {
      margin: 0 0 0.75rem;
      color: var(--lion-primary-color);
      font-size: 16px;
    }

    .prop-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
      font-size: 14px;
    }

    .hint { font-size: 12px; color: #666; margin-top: 0.75rem; }

    @media (max-width: 768px) {
      .prop-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="form-container">
  <h1 class="form-title">Available Loan Propositions</h1>
  <p class="subtitle">Select one proposition, then click Tasklist's <strong>Complete</strong> button.</p>

  <div id="errorAlert" class="alert"></div>

  <form class="form-horizontal" role="form" novalidate>
    <input id="selectedPropositionId" type="hidden" cam-variable-name="selectedPropositionId" cam-variable-type="String" />
    <input id="selectedPropositionAmount" type="hidden" cam-variable-name="selectedPropositionAmount" cam-variable-type="Double" />
    <input id="selectedPropositionRate" type="hidden" cam-variable-name="selectedPropositionRate" cam-variable-type="Double" />
    <input id="selectedPropositionTerm" type="hidden" cam-variable-name="selectedPropositionTerm" cam-variable-type="Integer" />

    <div class="propositions-list" id="propositionsList"></div>
    <div class="hint">If no generated propositions are present, default propositions are shown.</div>
  </form>
</div>

<script cam-script type="text/form-script">
  var errorAlert = document.getElementById("errorAlert");
  var selected = null;
  var propositions = [];

  function showError(message) {
    errorAlert.textContent = message;
    errorAlert.style.display = "block";
  }

  function clearError() {
    errorAlert.textContent = "";
    errorAlert.style.display = "none";
  }

  function fallbackPropositions() {
    return [
      { id: "P1", amount: 15000, rate: 4.5, term: 60, monthlyPayment: 276.33 },
      { id: "P2", amount: 15000, rate: 5.0, term: 48, monthlyPayment: 341.25 },
      { id: "P3", amount: 15000, rate: 3.9, term: 84, monthlyPayment: 201.54 }
    ];
  }

  function parsePropositions(variableValue) {
    if (!variableValue) {
      return fallbackPropositions();
    }

    try {
      if (typeof variableValue === "string") {
        return JSON.parse(variableValue);
      }
      if (Array.isArray(variableValue)) {
        return variableValue;
      }
    } catch (e) {
      // Fallback keeps the task completable even if upstream formatting is invalid.
    }

    return fallbackPropositions();
  }

  function setSelection(prop, card) {
    selected = prop;

    Array.prototype.forEach.call(document.querySelectorAll(".proposition-card"), function(el) {
      el.classList.remove("active");
    });
    card.classList.add("active");

    document.getElementById("selectedPropositionId").value = String(prop.id);
    document.getElementById("selectedPropositionAmount").value = String(prop.amount);
    document.getElementById("selectedPropositionRate").value = String(prop.rate);
    document.getElementById("selectedPropositionTerm").value = String(prop.term);

    clearError();
  }

  function render(list) {
    var container = document.getElementById("propositionsList");
    container.innerHTML = "";

    list.forEach(function(prop, index) {
      var card = document.createElement("div");
      card.className = "proposition-card";
      card.innerHTML =
        "<h3>Proposition " + (index + 1) + "</h3>" +
        "<div class='prop-details'>" +
        "<div><strong>Loan Amount:</strong> EUR " + Number(prop.amount).toFixed(2) + "</div>" +
        "<div><strong>Interest Rate:</strong> " + Number(prop.rate).toFixed(2) + "%</div>" +
        "<div><strong>Term:</strong> " + Number(prop.term) + " months</div>" +
        "<div><strong>Monthly Payment:</strong> EUR " + Number(prop.monthlyPayment || 0).toFixed(2) + "</div>" +
        "</div>";

      card.addEventListener("click", function() {
        setSelection(prop, card);
      });

      container.appendChild(card);
    });
  }

  camForm.on("form-loaded", function() {
    camForm.variableManager.fetchVariable("loanPropositions");
  });

  camForm.on("variables-fetched", function() {
    var propositionsVar = camForm.variableManager.variableValue("loanPropositions");
    propositions = parsePropositions(propositionsVar);
    render(propositions);
  });

  camForm.on("submit", function(evt) {
    if (!selected) {
      showError("Select one proposition before completing the task.");
      evt.submitPrevented = true;
    }
  });
</script>
</body>
</html>
